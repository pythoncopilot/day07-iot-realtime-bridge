<!DOCTYPE html>
<html>
<head>
  <title>Smart Home IoT Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #38bdf8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #93c5fd;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Smart Home IoT Dashboard (Live)</h1>

<div class="grid">

  <div class="card">
    <div class="title">Living Room Light</div>
    <div id="light" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Fan Speed</div>
    <div id="fan" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">AC Temperature</div>
    <div id="ac" class="value">--</div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
